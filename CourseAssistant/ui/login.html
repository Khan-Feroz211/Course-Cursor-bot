<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Civil Engineering &amp; Courses Counseller — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --p: #7c3aed; --p2: #6366f1; --a: #06b6d4; --g: #10b981;
      --pk: #ec4899; --am: #a855f7; --bg: #000;
    }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg); overflow: hidden; position: relative;
    }
    /* Pixel grid overlay */
    body::before {
      content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(124,58,237,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.06) 1px, transparent 1px);
      background-size: 44px 44px;
    }
    /* Deep aurora glow */
    body::after {
      content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 65% 55% at 12% 18%, rgba(124,58,237,0.20) 0%, transparent 60%),
        radial-gradient(ellipse 55% 50% at 90% 85%, rgba(99,102,241,0.16) 0%, transparent 60%),
        radial-gradient(ellipse 40% 35% at 55% 5%,  rgba(6,182,212,0.12) 0%, transparent 55%);
    }
    /* Animated blobs */
    .blob { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; animation: blobMove 15s ease-in-out infinite alternate; }
    .blob1 { width:750px;height:750px;background:radial-gradient(circle,rgba(124,58,237,0.48) 0%,transparent 70%);top:-280px;left:-280px;filter:blur(110px);animation-delay:0s; }
    .blob2 { width:650px;height:650px;background:radial-gradient(circle,rgba(99,102,241,0.38) 0%,transparent 70%);bottom:-220px;right:-220px;filter:blur(100px);animation-delay:-6s; }
    .blob3 { width:480px;height:480px;background:radial-gradient(circle,rgba(6,182,212,0.26) 0%,transparent 70%);top:38%;left:36%;filter:blur(90px);animation-delay:-11s; }
    .blob4 { width:380px;height:380px;background:radial-gradient(circle,rgba(168,85,247,0.32) 0%,transparent 70%);bottom:12%;left:6%;filter:blur(85px);animation-delay:-8s; }
    @keyframes blobMove {
      0%  { transform: translate(0,0) scale(1) rotate(0deg); }
      40% { transform: translate(45px,-65px) scale(1.10) rotate(5deg); }
      70% { transform: translate(-40px,50px) scale(0.92) rotate(-4deg); }
      100%{ transform: translate(22px,60px) scale(1.06) rotate(8deg); }
    }
    /* Floating particles */
    .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .particle { position: absolute; border-radius: 50%; animation: particleFloat linear infinite; opacity: 0; }
    @keyframes particleFloat {
      0%   { opacity: 0; transform: translateY(100vh) scale(0); }
      8%   { opacity: .75; }
      92%  { opacity: .25; }
      100% { opacity: 0; transform: translateY(-120px) scale(1); }
    }
    /* Card ring with animated gradient border */
    .card-wrap {
      position: relative; z-index: 1; padding: 2px; border-radius: 26px;
      background: linear-gradient(135deg,var(--p),var(--pk),var(--p2),var(--a),#f59e0b,var(--g),var(--am),var(--p));
      background-size: 400% 400%; animation: ringAnim 5s linear infinite;
      box-shadow:
        0 0 55px rgba(124,58,237,0.72),
        0 0 110px rgba(99,102,241,0.44),
        0 0 180px rgba(6,182,212,0.24),
        0 0 260px rgba(168,85,247,0.14);
    }
    @keyframes ringAnim { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .card {
      max-width: 440px; width: 100%;
      background: rgba(3,1,12,0.97);
      backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
      border-radius: 24px; padding: 46px 38px 34px;
      animation: cardIn .75s cubic-bezier(.34,1.56,.64,1) both;
      position: relative; overflow: hidden;
    }
    /* Top sheen line */
    .card::before {
      content: ""; position: absolute; top: 0; left: 12%; right: 12%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(196,181,253,0.9), rgba(103,232,249,0.6), transparent);
    }
    /* Inner radial uplight */
    .card::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,58,237,0.12) 0%, transparent 65%);
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(55px) scale(.87) rotateX(12deg); }
      to   { opacity:1; transform:translateY(0) scale(1) rotateX(0deg); }
    }
    .shake { animation: shake .38s ease 1; }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)}
      40%{transform:translateX(10px)}  60%{transform:translateX(-6px)}
      80%{transform:translateX(6px)}
    }
    .icon-wrap { text-align: center; margin-bottom: 10px; position: relative; z-index: 1; }
    .icon {
      display: inline-block; font-size: 66px;
      animation: iconFloat 4s ease-in-out infinite;
      filter: drop-shadow(0 0 22px rgba(124,58,237,0.78)) drop-shadow(0 0 44px rgba(99,102,241,0.48));
    }
    @keyframes iconFloat {
      0%,100% { transform:translateY(0) rotate(0deg) scale(1); filter:drop-shadow(0 0 18px rgba(124,58,237,0.72)) drop-shadow(0 0 38px rgba(99,102,241,0.42)); }
      50%      { transform:translateY(-8px) rotate(-5deg) scale(1.10); filter:drop-shadow(0 0 34px rgba(168,85,247,1)) drop-shadow(0 0 72px rgba(6,182,212,0.58)); }
    }
    h1 {
      text-align: center; font-size: 27px; font-weight: 900; letter-spacing: -.7px;
      background: linear-gradient(135deg,#c4b5fd,#a5b4fc 30%,#67e8f9 55%,#f0abfc 75%,#fbbf24,#c4b5fd);
      background-size: 400% 400%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: gradShift 7s ease infinite; margin-bottom: 5px; position: relative; z-index: 1;
    }
    @keyframes gradShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    .tagline { text-align: center; color: #3a445e; font-size: 13px; margin-bottom: 30px; letter-spacing: .5px; position: relative; z-index: 1; }
    label { display: block; margin: 17px 0 7px; color: #6272a4; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 1.1px; position: relative; z-index: 1; }
    .input-wrap { position: relative; z-index: 1; }
    input {
      width: 100%; padding: 15px 18px;
      background: rgba(5,2,18,0.92); border: 1px solid rgba(124,58,237,0.28); border-radius: 14px;
      font-size: 15px; color: #f1f5f9; outline: none;
      transition: border-color .3s, box-shadow .3s, background .3s;
    }
    input::placeholder { color: #1e2540; }
    input:focus {
      border-color: rgba(124,58,237,0.78);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.22), 0 0 26px rgba(124,58,237,0.26), 0 0 55px rgba(99,102,241,0.14);
      background: rgba(7,3,24,0.97);
    }
    button[type="submit"] {
      width: 100%; margin-top: 28px; border: none; border-radius: 14px; padding: 16px;
      font-size: 16px; font-weight: 800; cursor: pointer; color: #fff; letter-spacing: .9px;
      background: linear-gradient(135deg,#7c3aed,#6366f1,#06b6d4,#7c3aed);
      background-size: 300% 300%; animation: btnGrad 3.5s ease infinite;
      transition: transform .15s, box-shadow .3s;
      box-shadow: 0 6px 34px rgba(124,58,237,0.68),0 0 0 1px rgba(124,58,237,0.38),0 0 75px rgba(99,102,241,0.28);
      position: relative; overflow: hidden; z-index: 1;
    }
    button[type="submit"]::before {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(180deg,rgba(255,255,255,0.14) 0%,transparent 60%); border-radius: inherit;
    }
    button[type="submit"]::after {
      content: ""; position: absolute; top: -50%; left: -70%; width: 50%; height: 200%;
      background: rgba(255,255,255,0.22); transform: skewX(-22deg); transition: left .65s ease;
    }
    button[type="submit"]:hover::after { left: 140%; }
    @keyframes btnGrad { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    button[type="submit"]:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 48px rgba(124,58,237,0.80),0 0 0 1px rgba(124,58,237,0.50),0 0 100px rgba(99,102,241,0.40);
    }
    button[type="submit"]:active { transform: translateY(0); }
    .footer {
      margin-top: 26px; text-align: center; color: #29304d; font-size: 12px;
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; position: relative; z-index: 1;
    }
    .footer span { display: flex; align-items: center; gap: 6px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--g); animation: dotPulse 2.2s ease-in-out infinite; box-shadow: 0 0 10px var(--g), 0 0 22px rgba(16,185,129,0.48); }
    @keyframes dotPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.28;transform:scale(.55);box-shadow:none} }
    .error {
      display: none; margin-bottom: 20px;
      border: 1px solid rgba(239,68,68,0.55);
      background: linear-gradient(135deg,rgba(239,68,68,0.14),rgba(220,38,38,0.08));
      color: #fca5a5; border-radius: 13px; padding: 13px 16px; font-size: 13px;
      animation: fadeIn .35s ease; position: relative; z-index: 1;
      box-shadow: 0 0 22px rgba(239,68,68,0.15);
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>
  <div class="particles" id="particles"></div>

  <div class="card-wrap">
    <div class="card" id="card">
      <div class="icon-wrap"><span class="icon">🎓</span></div>
      <h1>Civil Engineering &amp; Courses Counseller</h1>
      <div class="tagline">Your personal course knowledge base</div>
      <div id="errorBox" class="error">⚠️ Incorrect username or password. Please try again.</div>
      <form method="POST" action="/login">
        <label for="username">Username</label>
        <div class="input-wrap">
          <input id="username" name="username" autocomplete="username" placeholder="Enter your username" required>
        </div>
        <label for="password">Password</label>
        <div class="input-wrap">
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter your password" required>
        </div>
        <button type="submit">🔐 Sign In</button>
      </form>
      <div class="footer">
        <span><span class="dot"></span> Secure</span>
        <span>·</span>
        <span>Private</span>
        <span>·</span>
        <span>100% Offline</span>
      </div>
    </div>
  </div>

  <script>
    const hasError = new URLSearchParams(window.location.search).get("error") === "1";
    if (hasError) {
      document.getElementById("errorBox").style.display = "block";
      document.getElementById("card").classList.add("shake");
    }

    // Generate floating particles
    const container = document.getElementById("particles");
    const colors = ["#7c3aed","#6366f1","#06b6d4","#a855f7","#ec4899","#10b981","#818cf8"];
    for (let i = 0; i < 55; i++) {
      const p = document.createElement("div");
      p.className = "particle";
      const size = Math.random() * 4 + 1.5;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        box-shadow: 0 0 ${size*2.5}px ${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${Math.random()*14+8}s;
        animation-delay:${Math.random()*12}s;
      `;
      container.appendChild(p);
    }
  </script>
</body>
</html>
